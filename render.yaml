services:
  - type: web
    name: designproject
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && cd ../frontend && npm install && npm run build && cd ../backend"
    startCommand: "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
